<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MediaPipe Pose Demo</title>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- MediaPipe CDN スクリプト -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.2/pose.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    header {
      padding: 0.5rem;
      font-size: 1rem;
      background: #111;
    }

    #container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: calc(100vh - 2.5rem);
      overflow: hidden;
      background: #000;
    }

    video {
      display: none; /* 入力用なので非表示 */
    }

    canvas {
      /* CSS は横幅だけ指定し、高さは自動 (video の比率で決まる) */
      width: 100%;
      height: auto;
      max-width: 100%;
      /* ミラー表示（自撮りカメラのように左右反転） */
      transform: scale(-1, 1);
      background: #000;
    }

    #message {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.3rem 0.5rem;
      font-size: 0.8rem;
      background: rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>
  <header>MediaPipe Pose リアルタイム骨格描画</header>

  <div id="container">
    <video class="input_video" playsinline></video>
    <!-- width / height はとりあえずダミー。実際は video のサイズで毎フレーム更新する -->
    <canvas class="output_canvas" width="640" height="480"></canvas>
  </div>

  <div id="message">カメラアクセスを許可してください</div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const message = document.getElementById('message');

    // video の実サイズに合わせて canvas のサイズを更新
    function updateCanvasSizeToVideo() {
      const vw = videoElement.videoWidth;
      const vh = videoElement.videoHeight;
      if (vw && vh) {
        // 内部解像度（描画バッファ）を video と同じにすることで縦横比を一致
        canvasElement.width  = vw;
        canvasElement.height = vh;
      }
    }

    // MediaPipe Pose の処理結果を受け取るコールバック
    function onResults(results) {
      // video のサイズがまだ取れていない場合があるので、ここでも毎回チェック
      updateCanvasSizeToVideo();

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 入力画像を描画（video と同じサイズで描画される）
      canvasCtx.drawImage(
        results.image,
        0,
        0,
        canvasElement.width,
        canvasElement.height
      );

      // ポーズランドマークがあれば描画
      if (results.poseLandmarks) {
        // 接続線（骨格）を描画
        drawConnectors(
          canvasCtx,
          results.poseLandmarks,
          POSE_CONNECTIONS,
          { color: '#00F', lineWidth: 2 }
        );

        // ランドマーク点を描画
        drawLandmarks(
          canvasCtx,
          results.poseLandmarks,
          { color: '#F00', lineWidth: 0, radius: 3 }
        );
      }

      canvasCtx.restore();
    }

    // MediaPipe Pose 初期化
    const pose = new Pose({
      locateFile: (file) => {
        // wasm / モデルファイルを CDN から取得
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.2/${file}`;
      }
    });

    pose.setOptions({
      upperBodyOnly: false,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
      modelComplexity: 1
    });

    pose.onResults(onResults);

    // カメラ初期化
    let camera = null;

    async function startCamera() {
      try {
        message.textContent = 'カメラ起動中…';

        camera = new Camera(videoElement, {
          onFrame: async () => {
            // video のメタデータ読み込み直後はサイズが 0 のことがあるので、
            // 取得できたタイミングで canvas を合わせる
            updateCanvasSizeToVideo();
            await pose.send({ image: videoElement });
          },
          width: 640,   // これは希望値。実際の解像度はデバイス依存
          height: 480
        });

        camera.start();
        message.textContent = 'ポーズ検出中（全身が入るように離れてください）';
      } catch (e) {
        console.error(e);
        message.textContent = 'カメラの起動に失敗しました';
      }
    }

    window.addEventListener('load', () => {
      startCamera();
    });
  </script>
</body>
</html>
