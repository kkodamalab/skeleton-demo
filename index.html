<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaPipe Realtime Skeleton Demo</title>

<style>
body{
margin:0;
background:#0b1020;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
}

.app{
max-width:900px;
margin:auto;
padding:20px;
}

button{
padding:12px;
border-radius:10px;
border:none;
background:#60a5fa;
color:white;
font-size:16px;
width:100%;
}

.viewer-wrap{
position:relative;
aspect-ratio:9/16;
background:black;
border-radius:16px;
overflow:hidden;
}

video,canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.mirror{
transform:scaleX(-1);
}
</style>
</head>

<body>

<div class="app">

<h2>MediaPipe リアルタイム・スケルトン表示</h2>

<button id="startBtn">カメラ開始</button>

<div class="viewer-wrap">
<video id="video" playsinline></video>
<canvas id="canvas"></canvas>
</div>

<p>FPS: <span id="fps">-</span></p>

</div>

<script type="module">

import {Pose,POSE_CONNECTIONS} from
"https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js";

import {
drawConnectors,
drawLandmarks
}
from
"https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js";

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const startBtn=document.getElementById("startBtn")
const fpsEl=document.getElementById("fps")

let pose
let stream
let running=false

let last=performance.now()

function resize(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

}

function fpsCounter(){

const now=performance.now()
const fps=1000/(now-last)
last=now

fpsEl.innerText=fps.toFixed(1)

}

function draw(results){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(!results.poseLandmarks)return

drawConnectors(
ctx,
results.poseLandmarks,
POSE_CONNECTIONS,
{color:"#60a5fa",lineWidth:4}
)

drawLandmarks(
ctx,
results.poseLandmarks,
{color:"#22c55e",radius:4}
)

}

async function loop(){

if(!running)return

await pose.send({image:video})

requestAnimationFrame(loop)

}

function onResults(results){

fpsCounter()

draw(results)

}

async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:720},
height:{ideal:1280}
},
audio:false
})

video.srcObject=stream

await video.play()

resize()

pose=new Pose({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
})

pose.setOptions({
modelComplexity:1,
smoothLandmarks:true,
minDetectionConfidence:0.5,
minTrackingConfidence:0.5
})

pose.onResults(onResults)

running=true

loop()

}

startBtn.onclick=startCamera

</script>

</body>
</html>
